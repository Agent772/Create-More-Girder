name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Extract version and changelog
        run: |
          echo "VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV
          awk '/^## Version/{if(found) exit; found=1} found{print}' CHANGELOG.md > /tmp/release-notes.md

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build jar
        run: ./gradlew jar

      - name: Publish to CurseForge and Modrinth
        run: |
          CHANGELOG=$(cat /tmp/release-notes.md)
          ./gradlew release \
            -Pcurseforge_api_key=${{ secrets.CURSEFORGE_API_KEY }} \
            -Pmodrinth_token=${{ secrets.MODRINTH_TOKEN }} \
            -Pchangelog="$CHANGELOG"

      - name: Create Gitea release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-forge
          name: v${{ env.VERSION }}-forge
          files: build/libs/create-more-girder-*-forge.jar
          body_path: /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
